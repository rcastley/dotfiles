---
- name: Install Homebrew formulae
  community.general.homebrew:
    name:
      - gh
      - go
      - htop
      - hugo
      - jq
      - mole
      - ncurses
      - python@3.14
      - sqlite
      - starship
      - uv
      - wget
      - zsh
      - zsh-autosuggestions
      - zsh-history-substring-search
      - zsh-syntax-highlighting
    state: present

- name: Check if Ghostty is already installed
  ansible.builtin.shell: brew list --cask ghostty 2>/dev/null || brew list --cask ghostty@tip 2>/dev/null
  register: ghostty_check
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Darwin"

- name: Install Ghostty (tip)
  community.general.homebrew_cask:
    name: ghostty@tip
    state: present
  when: ansible_os_family == "Darwin" and ghostty_check.rc != 0

- name: Install Nerd Font (Linux)
  community.general.homebrew_cask:
    name: font-fira-code-nerd-font
    state: present
  when: ansible_os_family != "Darwin"
