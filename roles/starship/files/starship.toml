"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#B5457A)\
$os\
$username\
$hostname\
[](bg:#C06A3E fg:#B5457A)\
$directory\
[](fg:#C06A3E bg:#C9993A)\
$git_branch\
$git_status\
[](fg:#C9993A bg:#549448)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:#549448 bg:#3D7E76)\
$docker_context\
[](fg:#3D7E76 bg:#2C5468)\
$time\
[ ](fg:#2C5468)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#B5457A fg:white bold"
style_root = "bg:#B5457A fg:white bold"
format = '[$user]($style)'
disabled = false

[hostname]
ssh_only = false
style = "bg:#B5457A fg:white"
format = '[@$hostname ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#B5457A fg:white"
disabled = true # Disabled by default

[directory]
style = "bg:#C06A3E fg:white"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#3D7E76 fg:white"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bg:#C9993A fg:white"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#C9993A fg:white"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:#549448 fg:white"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#2C5468 fg:white"
format = '[ ♥ $time ]($style)'
